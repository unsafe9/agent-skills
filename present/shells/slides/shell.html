<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deck</title>
<!-- ASSEMBLED by build.py: the CSS slot below = base.css + chosen skin; the JS slot
     near the end = engines/slides.js; the body slot = the authored fragment
     (<main id="deck"> slides + overview div + footer). Single offline file. -->

<!-- 1) base cosmetics THEN skin decoration. Skin :root wins over base :root. -->
<style>{{CSS}}</style>

<!-- 2) STRUCTURAL CSS for the slides structure — billboard type scale, container widths,
     .slide spacing, mode positioning (mode-slides / mode-scroll), and nav chrome
     (footer / #progress / #counter / #overview / .ov-* / .notes). Loaded LAST so structural
     sizing wins over the skin and is immune to reskinning. This is why slides reads
     billboard-grade from the same skin file that makes scroll document-grade. -->
<style>
  html,body{margin:0;height:100%}
  body{line-height:1.45}

  /* rescale the shared spacing ladder UP for billboard distance — every gap/pad
     that reads these tokens (here and in the shared figures/prose modules) follows */
  :root{
    --gap-tight: clamp(.6rem, 1.5vw, .95rem);
    --gap:       clamp(1.2rem, 2.6vw, 1.9rem);
    --gap-wide:  clamp(1.8rem, 4vw, 3.2rem);
    --pad:       clamp(1.2rem, 2.2vw, 1.6rem);
  }

  /* slide box + container widths */
  .slide{display:flex; flex-direction:column; justify-content:center;
    padding:7vmin; padding-bottom:calc(7vmin + 36px)}
  .wrap{width:100%; max-width:1040px; margin:0 auto}
  .wide{width:100%; max-width:min(1320px,94vw); margin:0 auto}

  /* MODE POSITIONING */
  body.mode-slides{overflow:hidden}
  body.mode-slides .slide{position:fixed; inset:0; opacity:0; pointer-events:none; transition:opacity .3s ease}
  body.mode-slides .slide.active{opacity:1; pointer-events:auto}
  body.mode-scroll{overflow-x:hidden; overflow-y:auto}
  body.mode-scroll .slide{position:relative; min-height:100vh; opacity:1; pointer-events:auto; border-top:1px solid var(--line)}
  body.mode-scroll .slide:first-child{border-top:0}

  /* type scale — billboard-grade (readable from across a room) */
  .kicker{font-size:.95rem; letter-spacing:.16em; margin-bottom:1.2rem}
  h1{font-size:clamp(2.8rem,7vw,4.8rem); line-height:1.04; margin:0; font-weight:760; letter-spacing:-.02em}
  h2{font-size:clamp(2rem,5vw,3.2rem); line-height:1.1; margin:0 0 1.5rem; font-weight:720; letter-spacing:-.015em}
  .lead{font-size:clamp(1.25rem,2.4vw,1.8rem); max-width:42ch; line-height:1.4}
  p{font-size:clamp(1.2rem,2vw,1.55rem)}
  .title h1{margin-bottom:1.5rem}

  ul.points{padding:0; margin:0; display:grid; gap:var(--gap)}
  ul.points li{font-size:clamp(1.25rem,2.3vw,1.7rem); padding-left:1.7rem}
  ul.points li::before{width:.55rem; height:.55rem}
  ul.points li small{font-size:.7em; margin-top:.25rem; line-height:1.4}

  .cols{display:grid; grid-template-columns:1fr 1fr; gap:var(--gap-wide)}
  .col h3{margin:.2rem 0 .9rem; font-size:1.1rem; letter-spacing:.04em}

  .cards{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:var(--gap)}
  .card{padding:var(--pad)}
  .card h3{margin:0 0 .5rem; font-size:1.3rem}
  .card p{margin:0; font-size:1.1rem}

  table{font-size:clamp(1.1rem,1.9vw,1.45rem)}
  th,td{padding:.9rem 1rem}
  thead th{font-size:.9rem; letter-spacing:.05em}

  .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:var(--gap)}
  .stat .n{font-size:clamp(3rem,8.5vw,5.6rem); font-weight:780; letter-spacing:-.03em; line-height:1}
  .stat .l{margin-top:.5rem; font-size:1.15rem}

  pre{padding:1.3rem 1.5rem; font-size:clamp(1rem,1.7vw,1.25rem); line-height:1.55}

  .diagram{max-height:56vh} .diagram .dt{font-size:21px} .diagram .ds{font-size:14px} .diagram .dconn{stroke-width:3}
  .flow{gap:var(--gap-tight)} .node{padding:var(--pad); font-size:1.15rem}
  .node small{font-size:.8rem; margin-top:.25rem} .arrow{font-size:1.6rem}

  .chart{max-height:50vh; margin-top:.5rem}
  .bars{display:flex; align-items:flex-end; gap:var(--gap); height:44vh; margin-top:1rem}
  .bar{flex:1; height:100%; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; gap:.5rem}
  .bar i{height:var(--v); border-radius:10px 10px 0 0} .bar b{font-size:1.3rem} .bar span{font-size:1rem}

  blockquote{margin:0; padding:.5rem 0 .5rem 1.8rem; font-size:clamp(1.5rem,3.4vw,2.4rem); font-weight:600; line-height:1.28}
  blockquote cite{display:block; margin-top:1.1rem; font-size:1.1rem; font-weight:400}

  .options{display:grid; gap:1rem; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); margin:.4rem 0 1.2rem}
  .option{padding:1.2rem 1.3rem} .option b{font-size:1.3rem; margin-bottom:.45rem} .option p{font-size:1.05rem; line-height:1.45}
  .option.pick b::after{font-size:.78rem}
  .ask{font-size:clamp(1.2rem,2.1vw,1.55rem); margin-top:.3rem}
  .freeinput{margin-top:1rem; max-width:760px} .freeinput label{margin-bottom:.4rem; font-size:1.1rem}
  .ask-input{font-size:1.1rem}

  #composer{margin-top:.4rem}
  #prompt-preview{padding:1.1rem 1.3rem; font-size:clamp(1.15rem,1.9vw,1.45rem); line-height:1.5; margin:0 0 1rem}
  #copy-btn{padding:.75rem 1.5rem; font-size:1.1rem}

  /* speaker notes positioning */
  .notes{display:none; margin-top:1.8rem; padding:1.1rem 1.3rem; font-size:1.05rem; line-height:1.5; max-width:62ch}
  .notes::before{font-size:.72rem; letter-spacing:.12em; margin-bottom:.45rem}
  body.show-notes .notes{display:block}

  /* footer: progress + counter + controls */
  footer{position:fixed; left:0; right:0; bottom:0; height:36px; display:flex; align-items:center;
    gap:.9rem; padding:0 1rem; font-size:.85rem; z-index:50; background:linear-gradient(transparent, var(--bg) 60%)}
  #progress{position:absolute; top:0; left:0; height:2px; width:100%; background:transparent}
  #bar{height:100%; width:0; transition:width .2s ease}
  .fbtn{padding:.18rem .6rem}
  #counter{font-variant-numeric:tabular-nums}
  .hint{margin-left:auto; opacity:.6}
  @media (max-width:640px){.hint{display:none}}

  /* overview grid (both modes) */
  #overview{position:fixed; inset:0; background:var(--bg); z-index:100; display:none;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:.8rem; padding:5vmin; align-content:start; overflow:auto}
  body.overview #overview{display:grid}
  body.overview .slide{visibility:hidden}
  .ov-item{display:flex; gap:.7rem; align-items:baseline; padding:.95rem 1.05rem}
  .ov-num{font-variant-numeric:tabular-nums; font-size:.9rem}
  .ov-t{font-size:1rem; line-height:1.3}
</style>
</head>
<body class="mode-slides">

{{BODY}}

<script>{{JS}}</script>
</body>
</html>
