<main class="canvas">
  <header class="fig-head">
    <div class="eyebrow">Concurrency · the bug</div>
    <h1>Two goroutines lost-update the same counter</h1>
  </header>

  <figure class="stage">
    <svg class="race" viewBox="0 0 720 420" role="img"
         aria-label="Lost-update race: both goroutines read n=0, both write n=1, one increment vanishes">
      <!-- lanes -->
      <line class="lane" x1="170" y1="60" x2="170" y2="380"/>
      <text class="actor" x="170" y="44">Goroutine A</text>
      <line class="lane" x1="540" y1="60" x2="540" y2="380"/>
      <text class="actor" x="540" y="44">Goroutine B</text>

      <!-- the bad interleaving region (the headline highlight) -->
      <rect class="race-window" x="120" y="110" width="470" height="150" rx="10"/>
      <text class="evt-l" x="355" y="100" text-anchor="middle" opacity="0.7">race window — no mutex held</text>

      <!-- events, time downward; data-step lights them in the side rail walk -->
      <g class="evt" data-step="1">
        <circle class="ev" cx="170" cy="140"/>
        <text class="evt-l" x="156" y="144" text-anchor="end">read n=0</text>
      </g>
      <g class="evt" data-step="2">
        <circle class="ev" cx="540" cy="180"/>
        <text class="evt-l" x="556" y="184">read n=0</text>
      </g>
      <g class="evt bad" data-step="3">
        <circle class="ev" cx="170" cy="240"/>
        <text class="evt-l" x="156" y="244" text-anchor="end">write n=1</text>
      </g>
      <g class="evt bad" data-step="3">
        <circle class="ev" cx="540" cy="240"/>
        <text class="evt-l" x="556" y="244">write n=1</text>
      </g>

      <!-- happens-before edges -->
      <path class="hb" d="M170 140 V240"/>
      <path class="hb hb--cross" d="M170 140 C 300 160, 420 160, 540 180" marker-end="url(#rah)"/>
      <path class="hb hb--race" d="M170 240 H540" marker-end="url(#rah)"/>
      <text class="evt-l" x="355" y="290" text-anchor="middle" opacity="0.85">expected order never enforced</text>

      <defs>
        <marker id="rah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0 0 L10 5 L0 10 z"/>
        </marker>
      </defs>
    </svg>
    <figcaption>Without the mutex, the read-modify-write of <code>n</code> interleaves and one increment vanishes — final <code>n=1</code>, not <code>2</code>.</figcaption>
  </figure>

  <aside class="annot">
    <ol class="steps">
      <li data-step="1"><b>A reads n=0</b><span>before B has written anything</span></li>
      <li data-step="2"><b>B reads n=0</b><span>stale — should already see A's increment</span></li>
      <li data-step="3" class="bad"><b>both write n=1</b><span>second write clobbers the first; one increment lost</span></li>
    </ol>
    <div class="legend">
      <span><span class="swatch a"></span>Goroutine A</span>
      <span><span class="swatch b"></span>Goroutine B</span>
      <span><span class="swatch bad"></span>race window</span>
    </div>
  </aside>
</main>
