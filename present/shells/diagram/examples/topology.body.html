<main class="canvas">
  <header class="fig-head">
    <div class="eyebrow">Auth · request path</div>
    <h1>A login round-trips through the gateway, auth service, and token store</h1>
  </header>

  <figure class="stage">
    <svg class="swimlane" viewBox="0 0 640 380" role="img"
         aria-label="Login sequence: client to gateway to auth to token store and back">
      <!-- lifelines + actors -->
      <line class="lane" x1="90"  y1="56" x2="90"  y2="350"/><text class="actor" x="90"  y="40">Client</text>
      <line class="lane" x1="280" y1="56" x2="280" y2="350"/><text class="actor" x="280" y="40">Gateway</text>
      <line class="lane" x1="460" y1="56" x2="460" y2="350"/><text class="actor" x="460" y="40">Auth</text>
      <line class="lane" x1="600" y1="56" x2="600" y2="350"/><text class="actor" x="600" y="40">Tokens</text>

      <!-- activation bars -->
      <rect class="active" x="273" y="90"  width="14" height="210"/>
      <rect class="active" x="453" y="130" width="14" height="120"/>

      <!-- messages -->
      <path class="msg" d="M90 90 H280"  marker-end="url(#ah)"/><text class="mlabel" x="185" y="82">POST /login</text>
      <path class="msg" d="M287 130 H460" marker-end="url(#ah)"/><text class="mlabel" x="373" y="122">verify(creds)</text>
      <path class="msg" d="M467 170 H600" marker-end="url(#ah)"/><text class="mlabel" x="533" y="162">mint(jwt)</text>
      <path class="msg msg--return" d="M600 210 H467" marker-end="url(#ah)"/><text class="mlabel" x="533" y="202">jwt</text>
      <path class="msg msg--return" d="M453 250 H287" marker-end="url(#ah)"/><text class="mlabel" x="373" y="242">200 + jwt</text>
      <path class="msg msg--return" d="M273 300 H90"  marker-end="url(#ah)"/><text class="mlabel" x="185" y="292">Set-Cookie</text>

      <defs>
        <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0 0 L10 5 L0 10 z"/>
        </marker>
      </defs>
    </svg>
    <figcaption>The gateway never talks to the token store directly — it always routes through <code>Auth</code>, which owns minting.</figcaption>
  </figure>

  <aside class="annot">
    <div class="legend">
      <span><span class="swatch a"></span>request</span>
      <span><span class="swatch b"></span>response</span>
    </div>
    <div class="layers">
      <div class="layer"><b>Edge</b><span>Gateway · routing, auth cookie</span></div>
      <div class="layer layer--accent"><b>Service</b><span>Auth · credential check, mint</span></div>
      <div class="layer"><b>Store</b><span>Tokens · signing keys, revocation</span></div>
    </div>
    <ul class="tree">
      <li><span class="t-dir">auth/</span>
        <ul>
          <li><span class="t-file">handler.go</span></li>
          <li><span class="t-dir">token/</span>
            <ul>
              <li><span class="t-file">mint.go</span></li>
              <li><span class="t-file">verify.go</span></li>
            </ul>
          </li>
        </ul>
      </li>
    </ul>
  </aside>
</main>
