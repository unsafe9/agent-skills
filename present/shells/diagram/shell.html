<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diagram</title>

<!-- 1) base cosmetics THEN skin decoration. Skin :root wins over base :root. -->
<style>{{CSS}}</style>

<!-- 2) STRUCTURAL CSS for the diagram canvas — a figure-first frame that maximizes ONE
     inline-SVG visual to the viewport, with a side rail for legend/annotation and a caption
     under the figure. Loaded LAST so structural sizing wins over the skin and is immune to
     reskinning. The visual lives in the authored fragment; this block only sizes it.
     NOTE: STYLE `diagram` (this shell) is the full-page figure canvas; `.diagram` (the CSS
     class, in base.css) is the inline branching-SVG primitive you can drop into any style.
     The STYLE gives a primitive the whole viewport — the focal SVG is usually `.swimlane` /
     `.race` / `.diagram` / `.chart`; it does NOT require the `.diagram` class. -->
<style>
  body{margin:0; line-height:1.5}

  .canvas{max-width:min(1280px,96vw); margin:0 auto; min-height:100vh;
    padding:clamp(1.2rem,4vw,2.6rem); display:grid; grid-template-rows:auto 1fr; gap:1.2rem}
  /* with a side rail, split into figure (left) + annotation column (right) */
  .canvas:has(.annot){grid-template-columns:1fr minmax(15rem,22rem); grid-template-rows:auto 1fr}
  .canvas:has(.annot) .fig-head{grid-column:1 / -1}
  @media(max-width:820px){.canvas:has(.annot){grid-template-columns:1fr}}

  /* header — document-grade type scale */
  .fig-head .eyebrow{font-size:.85rem; letter-spacing:.14em; margin-bottom:.55rem}
  .fig-head h1{font-size:clamp(1.6rem,3.4vw,2.5rem); line-height:1.12; letter-spacing:-.02em; margin:0; font-weight:760; max-width:26ch}

  /* the stage — maximize the focal SVG to the viewport */
  .stage{display:grid; place-items:center; min-height:0; gap:.9rem}
  .stage > svg{width:100%; height:auto; max-height:78vh}
  .stage > figcaption{font-size:1rem; color:var(--muted); text-align:center; max-width:64ch; margin:0}
  /* multiple stacked figures share the column */
  .stage + .stage{margin-top:1.5rem}

  /* the focal primitives — maximize to the full canvas (intrinsic sizing: figures.css) */
  .swimlane,.race{max-height:74vh}
  .tree{margin:0; text-align:left; justify-self:start}
  .layers{width:100%; max-width:34rem; justify-self:center}

  /* the side rail — annotation steps + legend; scrolls internally, never the SVG */
  .annot{min-height:0; overflow:auto; display:flex; flex-direction:column; gap:1.4rem}
  .steps{list-style:none; counter-reset:step; margin:0; padding:0; display:grid; gap:.7rem}
  .steps li{position:relative; padding:.55rem .8rem .55rem 2.4rem; border:1px solid var(--line);
    border-radius:var(--radius); background:var(--bg2); cursor:pointer; counter-increment:step}
  .steps li::before{content:counter(step); position:absolute; left:.7rem; top:.55rem;
    width:1.3rem; height:1.3rem; border-radius:50%; background:var(--line); color:var(--fg);
    font-size:.78rem; font-weight:700; display:flex; align-items:center; justify-content:center}
  .steps li.on{border-color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent)}
  .steps li.on::before{background:var(--accent); color:var(--bg)}
  .steps li.bad{border-left:3px solid var(--bad)}
  .steps li b{display:block; font-size:1rem}
  .steps li span{display:block; color:var(--muted); font-size:.9rem; margin-top:.1rem}

  .legend{gap:1rem; font-size:.9rem; color:var(--muted)}
  .legend span{gap:.45rem}
  .swatch{width:.85rem; height:.85rem; margin-right:.1rem}

  @media(max-width:820px){.swimlane,.race{max-height:none}}
</style>
</head>
<body>

{{BODY}}

<script>{{JS}}</script>
</body>
</html>
