<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>Cheatsheet</title>

<style>{{CSS}}</style>

<style>
  body{margin:0; line-height:1.4; font-size:15px; overflow-x:hidden}
  body{--cgap:1rem; --ccol:17rem; --cpad:clamp(1rem,3vw,2rem)}
  .page{max-width:1300px; margin:0 auto; padding:var(--cpad)}

  /* compact header: spans full width above the columns */
  header{margin:0 0 1.1rem; padding-bottom:.75rem; border-bottom:2px solid var(--line);
    display:flex; align-items:baseline; flex-wrap:wrap; gap:.5rem 1rem}
  header h1{margin:0; font-size:clamp(1.25rem,2.4vw,1.7rem); font-weight:760; letter-spacing:-.01em}
  header .scope{margin:0; color:var(--muted); font-size:.92rem}
  header .scope b{color:var(--accent); font-weight:600}

  /* the multi-column flow — column-gap is the gutter; groups carry vertical rhythm */
  .sheet{columns:var(--ccol); column-gap:var(--cgap)}

  /* a topic card — break-inside:avoid never splits a group across a column or page */
  .group{background:var(--bg2); border:1px solid var(--line); border-radius:var(--radius);
    padding:.8rem .9rem .85rem; margin:0 0 var(--cgap);
    break-inside:avoid; -webkit-column-break-inside:avoid; page-break-inside:avoid}
  .group h2{margin:0 0 .5rem; font-size:.92rem; font-weight:700; letter-spacing:.01em; color:var(--fg);
    display:flex; align-items:center; gap:.45rem; padding-bottom:.4rem; border-bottom:1px solid var(--line)}
  .group h2::before{content:""; width:.5rem; height:.5rem; border-radius:2px; background:var(--accent); flex:0 0 auto}

  /* shared inline atoms */
  code{font-family:var(--mono); font-size:.86em}
  .nw{white-space:nowrap}
  .hint{color:var(--muted); font-size:.82rem; margin:.5rem 0 0}
  .yes{color:var(--good)} .no{color:var(--bad)}

  /* ROW TYPE 1 — definitions: term -> meaning */
  .defs{margin:0}
  .defs > div{display:grid; grid-template-columns:minmax(4.5rem,38%) 1fr; gap:.2rem .7rem;
    padding:.3rem 0; border-top:1px solid var(--line)}
  .defs > div:first-child{border-top:0; padding-top:0}
  .defs dt{margin:0; font-weight:600; color:var(--fg); font-size:.86rem; min-width:0; white-space:normal; overflow-wrap:anywhere}
  .defs dd{margin:0; color:var(--muted); font-size:.84rem}

  /* ROW TYPE 2 — commands: mono command stacked over its note (survives a narrow column) */
  .cmds{list-style:none; margin:0; padding:0}
  .cmds li{padding:.34rem 0; border-top:1px solid var(--line)}
  .cmds li:first-child{border-top:0; padding-top:0}
  .cmds code{display:block; color:var(--accent); font-size:.85rem; overflow-wrap:anywhere}
  .cmds span{display:block; color:var(--muted); font-size:.82rem; margin-top:.1rem}

  /* ROW TYPE 3 — lookup table: short cells, .nw on the key column */
  table{width:100%; border-collapse:collapse; font-size:.84rem}
  th,td{text-align:left; padding:.28rem .4rem; border-bottom:1px solid var(--line); vertical-align:top}
  thead th{color:var(--muted); font-weight:600; font-size:.7rem; letter-spacing:.05em; text-transform:uppercase}
  tbody tr:last-child td{border-bottom:0}
  td code{color:var(--accent)}

  /* ROW TYPE 4 — keyboard shortcuts: key-caps + action */
  .keys{list-style:none; margin:0; padding:0}
  .keys li{display:flex; align-items:baseline; gap:.6rem; padding:.32rem 0; border-top:1px solid var(--line)}
  .keys li:first-child{border-top:0; padding-top:0}
  .keys .combo{flex:0 0 auto; display:inline-flex; align-items:center; gap:.18rem; white-space:nowrap}
  .keys .act{color:var(--muted); font-size:.84rem}
  kbd{font-family:var(--mono); font-size:.72rem; line-height:1; color:var(--fg);
    background:linear-gradient(var(--bg2),var(--code-bg)); border:1px solid var(--line);
    border-bottom-width:2px; border-radius:5px; padding:.28em .45em; box-shadow:0 1px 0 rgba(0,0,0,.35);
    white-space:nowrap}
  .keys .combo .sep{color:var(--muted); font-size:.72rem; padding:0 .05rem}

  footer{margin-top:1.2rem; padding-top:.7rem; border-top:1px solid var(--line);
    color:var(--muted); font-size:.8rem}

  /* PRINT — clean ink-on-white that fits A4/Letter; groups never break across pages */
  @media print{
    :root{
      --bg:#fff; --bg2:#fff; --line:#cfd3da; --fg:#16181d; --muted:#454c59;
      --accent:#13458f; --good:#15703f; --bad:#a31f17; --code-bg:#f1f2f5;
    }
    @page{margin:11mm}
    html,body{background:#fff}
    body{font-size:8.8pt; line-height:1.32}
    .page{max-width:none; padding:0}
    .sheet{column-width:auto; column-count:3; column-gap:7mm}
    .group{background:#fff; box-shadow:none}
    header{border-color:#222}
    kbd{background:#fff; box-shadow:none; border-color:#9aa0ab; color:#16181d}
    a{color:var(--fg); text-decoration:none}
  }
</style>
</head>
<body>

{{BODY}}

<script>{{JS}}</script>
</body>
</html>
